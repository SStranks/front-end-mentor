# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Lint
permissions: read-all

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node v22
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - run: |
          find node_modules/.pnpm -maxdepth 1 | grep resolver-binding

      - name: Check musl binding
        run: |
          echo "GNU:"
          ls -la node_modules/.pnpm/@unrs+resolver-binding-linux-x64-gnu@*/node_modules/@unrs || true

          echo
          echo "MUSL:"
          ls -la node_modules/.pnpm/@unrs+resolver-binding-linux-x64-musl@*/node_modules/@unrs || true

      - name: MegaLinter
        uses: oxsecurity/megalinter/flavors/javascript@v9.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTENDS: ./.github/configs/mega-linter.yaml

      - name: Megalinter Artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: MegaLinter reports
          path: |
            megalinter-reports
            mega-linter.log
          retention-days: 1
