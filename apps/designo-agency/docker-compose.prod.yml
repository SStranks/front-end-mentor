services:
  # Backend: NodeJS Express
  node-api:
    container_name: fem36-node-api-prod
    build:
      dockerfile: ./Dockerfile
    image: fem36-nodejs-express-api
    env_file:
      - ./server/.env.prod
    networks:
      - FEM36
    security_opt:
      - no-new-privileges

  # Frontend: Nginx-React
  react-app:
    container_name: fem36-react-app-prod
    build:
      dockerfile: ./Dockerfile
    image: fem36-react-app
    env_file:
      - ./client/.env.prod
    depends_on:
      - node-api
    networks:
      - FEM36
    security_opt:
      - no-new-privileges

  # NGINX
  nginx:
    container_name: nginx-prod
    restart: on-failure
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      - node-api
      - react-app
    ports:
      - 8080:80
    networks:
      - FEM36
    security_opt:
      - no-new-privileges

networks:
  FEM36:
