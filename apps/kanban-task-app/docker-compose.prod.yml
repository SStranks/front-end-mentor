services:
  # Backend: NodeJS Express
  node-api:
    container_name: fem35-node-api-prod
    build:
      dockerfile: ./Dockerfile.prod
    image: fem35-nodejs-express-api
    env_file:
      - ./server/.env.prod
    networks:
      - FEM35-Kanban
    security_opt:
      - no-new-privileges

  # Frontend: Nginx-React
  react-app:
    container_name: fem35-react-app-prod
    build:
      dockerfile: ./Dockerfile
    image: fem35-react-app
    env_file:
      - ./client/.env.prod
    depends_on:
      - node-api
    networks:
      - FEM35-Kanban
    security_opt:
      - no-new-privileges

  # NGINX
  nginx:
    container_name: fem35-nginx-prod
    restart: on-failure
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: fem35-nginx-prod
    depends_on:
      - node-api
      - react-app
    ports:
      - 8080:80
    networks:
      - FEM35-Kanban
    security_opt:
      - no-new-privileges

networks:
  FEM35-Kanban:
