services:

  # Backend: NodeJS Express  
  node-api:
    # build:
    #   dockerfile: Dockerfile.dev
    container_name: fem35-node-api-dev
    image: node:18-alpine3.17
    working_dir: /app/backend
    command: npm start
    ports:
      - $NODE_LOCAL_PORT:$NODE_DOCKER_PORT
    volumes:
      - ./shared:/app/shared:ro
      - ./backend:/app/backend:ro
      - ../../node_modules:/node_modules:ro
    # develop:
    #   watch:
    #     - path: ./backend/package.json
    #       action: rebuild
    env_file:
      - ./backend/.env.dev
    depends_on:
      - mongo-db
    security_opt:
      - no-new-privileges

  # DB: MongoDB
  mongo-db:
    container_name: fem35-mongo-db
    image: mongo:6.0.6
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=$MONGODB_USER
      - MONGO_INITDB_ROOT_PASSWORD=$MONGODB_PASSWORD
    ports:
      - $MONGODB_LOCAL_PORT:$MONGODB_DOCKER_PORT
    volumes:
      - mongodb-data:/data/db
    security_opt:
      - no-new-privileges

  # DB: MongoDB Express
  mongo-express:
    image: mongo-express-custom
    depends_on:
      - mongo-db
    ports:
      - $MONGOEXP_LOCAL_PORT:$MONGOEXP_DOCKER_PORT
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo-db
      - ME_CONFIG_MONGODB_ADMINUSERNAME=$MONGODB_USER
      - ME_CONFIG_MONGODB_ADMINPASSWORD=$MONGODB_PASSWORD
      - ME_CONFIG_BASICAUTH_USERNAME=$MONGOEXP_BASICAUTH_USER
      - ME_CONFIG_BASICAUTH_PASSWORD=$MONGOEXP_BASICAUTH_PASS
    volumes:
      - mongodb-data:/data/db
    security_opt:
      - no-new-privileges

volumes:
  mongodb-data:
    name: mongodb-data
    external: true
