services:
  # Frontend: Nginx
  nginx:
    container_name: fem37-nginx-dev
    restart: unless-stopped
    # Image is custom / local
    image: nginx-1.24-alpine-brotli
    command: nginx -g 'daemon off;'
    ports:
      - $REACT_LOCAL_PORT:$REACT_DOCKER_PORT
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./client/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./client/nginx/headers.conf:/etc/nginx/conf.d/headers.conf:ro
      - ./client/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/nginx/redirects.map:/etc/nginx/redirects.map:ro
      - ./client/nginx/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
    security_opt:
      - no-new-privileges
