services:

  # Backend: NodeJS Express
  node-api:
    container_name: fem34-node-api-prod
    build:
      dockerfile: ./Dockerfile
    image: fem34-nodejs-express-api
    env_file:
      - ./backend/.env.prod
    networks:
      - FEM34
    security_opt:
      - no-new-privileges

  # Frontend: Nginx-React
  react-app:
    container_name: fem34-react-app-prod
    build:
      dockerfile: ./Dockerfile
    image: fem34-react-app
    env_file:
      - ./frontend/.env.prod
    depends_on:
      - node-api
    networks:
      - FEM34
    security_opt:
      - no-new-privileges

  # NGINX
  nginx:
    container_name: fem34-nginx-prod
    restart: on-failure
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      - node-api
      - react-app
    ports:
      - 8080:80
    networks:
      - FEM34
    security_opt:
      - no-new-privileges

networks:
  FEM34:
